kind = "web"
previewPath = "/"
title = "New Face Global Network"
version = "1.0.0"
id = "artifacts/nfgn"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21837

[services.development]
run = "pnpm --filter @workspace/nfgn run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nfgn", "run", "build" ]
publicDir = "artifacts/nfgn/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21837"
BASE_PATH = "/"
