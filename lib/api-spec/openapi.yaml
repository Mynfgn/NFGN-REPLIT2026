                    type: integer
                  groupVolume:
                    type: integer
                  cvMaintenanceRequired:
                    type: integer
                  proPackageProgress:
                    type: object
                    properties:
                      current:
                        type: integer
                      target:
                        type: integer
                      needed:
                        type: integer
                      level1ProMembers:
                        type: integer
                      level2ProMembers:
                        type: integer
                      level2Unlocked:
                        type: boolean
                  powerSquadBonus:
                    type: number
                  rolling30DayPcv:
                    type: number

  /reports/sales:
    get:
      operationId: getSalesReport
      tags: [reports]
      summary: Get sales report
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
        - name: period
          in: query
          schema:
            type: string
      responses:
